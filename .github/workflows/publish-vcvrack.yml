name: Build and Release VCV Rack Plugin

# win-x64 and lin-x64 are cross-compiled on Linux with the official VCV
# rack-plugin-toolchain (msvcrt + static libgcc/libstdc++/winpthread) — the same
# toolchain VCV Library uses. Building Windows on a native windows-latest runner
# links the runner's UCRT MinGW, whose C runtime/heap mismatches Rack's msvcrt
# and corrupts the heap on load (crash in the module constructor). mac-arm64 is
# built natively on macOS (no CRT-mismatch issue on that platform).

on:
  push:
    tags:
      - 'vcv-rack/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build/release (e.g. vcv-rack/v2.1.0)'
        required: true

env:
  TOOLCHAIN_DIR: /home/build/rack-plugin-toolchain

jobs:
  # Resolve tag + version once, validate it matches plugin.json, and share via outputs.
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve tag and version
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Strip the vcv-rack/ prefix, then a leading v
          VERSION="${TAG#vcv-rack/}"
          VERSION="${VERSION#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Validate tag version matches plugin.json
        shell: bash
        run: |
          JSON_VERSION=$(jq -r .version plugin.json)
          if [ "${{ steps.resolve.outputs.version }}" != "$JSON_VERSION" ]; then
            echo "::error::Tag version (${{ steps.resolve.outputs.version }}) and plugin.json version ($JSON_VERSION) mismatch"
            exit 1
          fi

  # Windows and Linux: official cross-compile toolchain in a Linux container.
  build-win-lin:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        platform: [win-x64, lin-x64]
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}

      - name: Avoid git dubious-ownership errors in container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build ${{ matrix.platform }}
        run: |
          export PLUGIN_DIR="$GITHUB_WORKSPACE"
          cd "$TOOLCHAIN_DIR"
          make plugin-build-${{ matrix.platform }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.platform }}
          path: ${{ env.TOOLCHAIN_DIR }}/plugin-build/*.vcvplugin
          retention-days: 1

  # macOS (Apple Silicon): native build with the Rack SDK.
  build-mac:
    needs: setup
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac-arm64
            sdk_url: https://vcvrack.com/downloads/Rack-SDK-2.6.4-mac-arm64.zip
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}

      - name: Download Rack SDK
        shell: bash
        run: |
          curl -L ${{ matrix.sdk_url }} -o Rack-SDK.zip
          unzip Rack-SDK.zip -d Rack-SDK

      - name: Build
        shell: bash
        run: |
          export RACK_DIR="$PWD/Rack-SDK/Rack-SDK"
          export CORES_DIR="$PWD/cores"
          make
          make dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.platform }}
          path: dist/*.vcvplugin
          retention-days: 1

  release:
    needs: [setup, build-win-lin, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Rust (for git-cliff)
        uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Generate CHANGELOG.md
        run: |
          git cliff -o CHANGELOG_FULL.md
          cat CHANGELOG_FULL.md

      - name: Extract changelog for current version
        run: |
          TAG="${{ needs.setup.outputs.tag }}"
          echo "Extracting changelog section for tag prefix: $TAG"
          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" {
              found = 1
              print
              next
            }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG_FULL.md > CHANGELOG.md
          echo "=== Extracted CHANGELOG.md ==="
          cat CHANGELOG.md

      - name: Prepend hand-written notes (if any)
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          NOTES_FILE="release-notes/v${VERSION}.md"
          TEMP_FILE=$(mktemp)
          if [ -f "$NOTES_FILE" ]; then
            cat "$NOTES_FILE" > "$TEMP_FILE"
          else
            echo "# Notes for version ${VERSION}" > "$TEMP_FILE"
          fi
          echo -e "\n" >> "$TEMP_FILE"
          cat CHANGELOG.md >> "$TEMP_FILE"
          mv "$TEMP_FILE" CHANGELOG.md
          cat CHANGELOG.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -name "*.vcvplugin" -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          body_path: CHANGELOG.md
          files: release-files/*.vcvplugin
